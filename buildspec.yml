version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - pip install -r requirements.txt -t package || true

  build:
    commands:
      - cp lambda_function.py package/
      - cd package
      - zip -r ../function.zip .
      - cd ..

artifacts:
  files:
    - function.zip
